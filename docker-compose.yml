version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: touruser
      POSTGRES_PASSWORD: tourpassword
      POSTGRES_DB: tourdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"

  app:
    build: .
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://touruser:tourpassword@postgres:5435/tourdb
      NODE_ENV: production
    volumes:
      - ./public/uploads:/app/public/uploads
    ports:
      - "3000:3000"

volumes:
  postgres_data:
